<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var isDark = stored ? stored === 'dark' : true;
        document.documentElement.classList.toggle('dark', isDark);
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/atlas-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Atlas Supervisor - Panel de gestión de operaciones de campo" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>Atlas Supervisor</title>
  </head>
  <body class="bg-slate-50 dark:bg-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
